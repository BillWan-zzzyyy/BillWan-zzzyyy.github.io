name: Update Scholar Citations

on:
  schedule:
    - cron: "0 4 * * 1" # Every Monday at 4:00 AM UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-citations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install scholarly pyyaml

      - name: Fetch citation data
        id: fetch
        continue-on-error: true
        run: python _scripts/fetch_scholar_citations.py

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet _data/scholar_citations.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/scholar_citations.json
          git commit -m "Update Google Scholar citations data"
          git push
